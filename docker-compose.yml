version: "3.3"

services:
  postgres:
    image: postgres:16
    container_name: legal-document-db

    environment:
      POSTGRES_USER: patrick
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: legal_documents

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: